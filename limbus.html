<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limbus Database - Dante's Note copybon</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
    <style>
        .filter-btn[data-filter="burn"].active { color: #ff4d4d !important; border-color: #ff4d4d !important; }
        .filter-btn[data-filter="bleed"].active { color: #ff944d !important; border-color: #ff944d !important; }
        .filter-btn[data-filter="tremor"].active { color: #ffe14d !important; border-color: #ffe14d !important; }
        .filter-btn[data-filter="rupture"].active { color: #4dff4d !important; border-color: #4dff4d !important; }
        .filter-btn[data-filter="sinking"].active { color: #4d94ff !important; border-color: #4d94ff !important; }
        .filter-btn[data-filter="charge"].active { color: #4b0082 !important; border-color: #4b0082 !important; }
        .filter-btn[data-filter="poise"].active { color: #ffffff !important; border-color: #ffffff !important; }
        .filter-group[data-filter-type="keyword"] .filter-btn.active { background: #ffffff !important; }

        nav {
            position: sticky; top: 0; z-index: 100;
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border-line);
            padding: 0 2rem;
        }
        .nav-inner {
            max-width: 1200px; margin: 0 auto; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-menu { display: flex; gap: 1.5rem; }
        .nav-link {
            text-decoration: none; color: var(--text-sub);
            font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .nav-link:hover { color: var(--text-main); }
        .nav-link.active { color: var(--accent-red); border-bottom: 2px solid var(--accent-red); padding-bottom: 4px; }

        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-main: #0d0d12;
            --bg-nav: #15151e;
            --bg-card: #1a1a24;
            --text-main: #f0f0f5;
            --text-sub: #9090a0;
            --border-line: #2a2a36;
            --accent-red: #d92d2d;
            --accent-gold: #e2ba36;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
        }

        .logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); text-decoration: none; }
        .logo span { color: var(--accent-red); }

        main { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }

        .filter-section {
            background-color: var(--bg-nav); border: 1px solid var(--border-line);
            border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem;
        }
        .filter-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .filter-label { font-size: 13px; color: var(--text-sub); width: 60px; font-weight: 600; }
        .filter-btn {
            background: transparent; border: 1px solid var(--border-line);
            color: var(--text-main); padding: 6px 14px; border-radius: 6px;
            font-size: 13px; cursor: pointer; transition: 0.2s;
        }
        .filter-btn.active { background: var(--text-main); color: var(--bg-main); font-weight: bold; border-color: var(--text-main); }

        .db-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
        .db-card {
            background-color: var(--bg-card); border: 1px solid var(--border-line);
            border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative;
        }
        .db-card.hidden { display: none; }
        .db-card:hover { transform: translateY(-3px); border-color: var(--accent-gold); }
        .card-img-placeholder { height: 140px; background: #111; overflow: hidden; border-bottom: 1px solid var(--border-line); }
        .card-img-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .rarity-badge {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7);
            border: 1px solid var(--accent-gold); color: var(--accent-gold); font-size: 11px;
            font-weight: bold; padding: 2px 6px; border-radius: 4px; z-index: 10;
        }
        .keyword-badge { position: absolute; top: 10px; right: 10px; display: flex; flex-wrap: wrap; gap: 4px; width: 50px; justify-content: flex-end; z-index: 10; }
        .keyword-badge img { width: 22px; height: 22px; object-fit: contain; background: rgba(176, 167, 167, 0.5); border-radius: 4px; padding: 2px; }

        .card-info { padding: 1rem; }
        .card-affiliation { font-family: 'Nanum Myeongjo', serif; font-size: 16px; font-weight: 700; color: var(--accent-gold); margin-bottom: 4px; }
        .card-title { font-size: 18px; font-weight: 800; }

        .search-container { margin-bottom: 1.5rem; }
        .search-input {
            width: 100%; padding: 12px 20px; border-radius: 8px;
            background: var(--bg-card); border: 1px solid var(--border-line);
            color: var(--text-main); font-size: 14px; outline: none; transition: 0.2s;
        }
        .search-input:focus { border-color: var(--accent-gold); box-shadow: 0 0 0 2px rgba(226, 186, 54, 0.2); }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
            z-index: 999; align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: var(--bg-card); border: 1px solid var(--border-line);
            border-radius: 12px; width: 90%; max-width: 450px; padding: 24px; position: relative; text-align: center;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; color: var(--text-sub); cursor: pointer; }
        .modal-img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 16px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <div class="logo">단붕이의<span>노트</span>copy본</div>
        <div class="nav-menu">
            <div class="nav-link active" data-target="section-identity">인격 보기</div>
            <div class="nav-link" data-target="section-ego">에고 보기</div>
            <div class="nav-link" data-target="section-contact">문의하기</div>
        </div>
    </div>
</nav>

<main>
    <section id="section-identity" class="page-section active">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="이름 또는 소속을 검색하세요...">
        </div>

        <div class="filter-section">
            <div class="filter-group" data-filter-type="rarity">
                <span class="filter-label">등급</span>
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="000" style="color:var(--accent-gold)">000</button>
                <button class="filter-btn" data-filter="00" style="color:#d1d1d1">00</button>
                <button class="filter-btn" data-filter="0" style="color:#a87462">0</button>
            </div>
            <div class="filter-group" data-filter-type="type">
                <span class="filter-label">속성</span>
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="slash">참격</button>
                <button class="filter-btn" data-filter="pierce">관통</button>
                <button class="filter-btn" data-filter="blunt">타격</button>
            </div>
            <div class="filter-group" data-filter-type="keyword">
                <span class="filter-label">키워드</span>
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="burn">화상</button>
                <button class="filter-btn" data-filter="bleed">출혈</button>
                <button class="filter-btn" data-filter="tremor">진동</button>
                <button class="filter-btn" data-filter="rupture">파열</button>
                <button class="filter-btn" data-filter="sinking">침잠</button>
                <button class="filter-btn" data-filter="charge">충전</button>
                <button class="filter-btn" data-filter="poise">호흡</button>
            </div>
        </div>
        <div class="db-grid" id="identityContainer"></div>
    </section>

    <section id="section-ego" class="page-section">
        <h2 style="color: var(--accent-gold);">E.G.O 데이터베이스</h2>
        <p style="color: var(--text-sub);">준비 중입니다.</p>
    </section>

    <section id="section-contact" class="page-section">
        <h2 style="color: var(--accent-red);">문의하기</h2>
         <p style="color: var(--accent-white);">j8dge8h@gmail.com로</p>
        <p style="color: var(--text-sub);">관리자에게 메시지를 남겨주세요.</p>
    </section>
</main>

<div class="modal-overlay" id="detailModal">
    <div class="modal-content">
        <span class="close-btn" id="closeBtn">&times;</span>
        <img src="" alt="" class="modal-img" id="modalImg">
        <div id="modalTitle" style="font-size: 20px; font-weight: bold; color: var(--accent-gold);"></div>
        <div id="modalAffiliation" style="color: var(--text-sub); margin-top: 5px;"></div>
    </div>
</div>

function renderCards() {
    const cont = document.getElementById('identityContainer');
    cont.innerHTML = characterData.map(c => {
        const typeIcon = iconLib[c.t] ? `<img src="${iconLib[c.t]}">` : '';
        const keywordIcons = c.k.map(k => iconLib[k] ? `<img src="${iconLib[k]}">` : '').join('');

        return `
            <div class="db-card" 
                data-rarity="${c.r}" 
                data-type="${c.t}" 
                data-keyword='${JSON.stringify(c.k)}'
                data-img="${c.img}"
                data-name="${c.n}"
                data-affiliation="${c.a}">
                <div class="rarity-badge">${c.r}</div>
                <div class="keyword-badge">
                    ${typeIcon}
                    ${keywordIcons}
                </div>
                <div class="card-img-placeholder"><img src="${c.img}" loading="lazy"></div>
                <div class="card-info">
                    <div class="card-affiliation">${c.a}</div>
                    <div class="card-title">${c.n}</div>
                </div>
            </div>`;
    }).join('');
    setupCardEvents();
}

// 섹션 전환
document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.getElementById(link.dataset.target).classList.add('active');
    });
});

// 검색창 이벤트
document.getElementById('searchInput').addEventListener('input', applyFilters);

// 필터 시스템
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const group = btn.parentElement;
        if (group.dataset.filterType === 'keyword') {
            if (btn.dataset.filter === 'all') {
                group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            } else {
                group.querySelector('[data-filter="all"]').classList.remove('active');
                btn.classList.toggle('active');
                if (!group.querySelector('.active')) group.querySelector('[data-filter="all"]').classList.add('active');
            }
        } else {
            group.querySelector('.active').classList.remove('active');
            btn.classList.add('active');
        }
        applyFilters();
    });
});

function applyFilters() {
    const aR = document.querySelector('.filter-group[data-filter-type="rarity"] .active').dataset.filter;
    const aT = document.querySelector('.filter-group[data-filter-type="type"] .active').dataset.filter;
    const aKs = Array.from(document.querySelectorAll('.filter-group[data-filter-type="keyword"] .active')).map(b => b.dataset.filter);
    const sT = document.getElementById('searchInput').value.toLowerCase().trim();

    document.querySelectorAll('.db-card').forEach(card => {
        const cardKs = JSON.parse(card.dataset.keyword);
        const mR = (aR === 'all' || aR === card.dataset.rarity);
        const mT = (aT === 'all' || aT === card.dataset.type);
        const mK = (aKs.includes('all') || aKs.every(k => cardKs.includes(k)));
        const mS = (sT === '' || card.dataset.name.toLowerCase().includes(sT) || card.dataset.affiliation.toLowerCase().includes(sT));

        card.classList.toggle('hidden', !(mR && mT && mK && mS));
    });
}

// 모달
function setupCardEvents() {
    document.querySelectorAll('.db-card').forEach(card => {
        card.onclick = () => {
            document.getElementById('modalImg').src = card.dataset.img;
            document.getElementById('modalTitle').innerText = card.dataset.name;
            document.getElementById('modalAffiliation').innerText = card.dataset.affiliation;
            document.getElementById('detailModal').style.display = 'flex';
        };
    });
}

document.getElementById('closeBtn').onclick = () => document.getElementById('detailModal').style.display = 'none';
window.onclick = (e) => { if (e.target.id === 'detailModal') document.getElementById('detailModal').style.display = 'none'; };

renderCards();
</script>
</body>
